<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">

    </head>
    <body>
        <header class="flex-container">
            <div class="logo">
                <img src="images/circlelogo (1).jpeg" alt="White Water Rafting Logo">
            </div>
            <nav class="nav-links">
                <div><a href="index.html">Home</a></div>
                <div><a href="about.html">About Us</a></div>
                <div><a href="trips.html">Trips </a></div>
                <div><a class="current" href="contacts.html">Contact Us</a></div>
            </nav>
        </header>
        <main>
            <h1>Contact Us</h1>
            

            <h2>Send Us a message</h2>
        <p>Address: White Water Rafting</p>
        <p>Phone: 999-999-9999 </p>
        <p>Email: <a href="email@gmail.com">email@gmail.com</a></p>
        <div class="map">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d6069.100372580111!2d-105.81787105829291!3d40.48521524580976!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x87699fbdc0d94283%3A0xc35a71d313d7108d!2sCondado%20de%20Larimer!5e0!3m2!1spt-BR!2sbr!4v1729930142973!5m2!1spt-BR!2sbr" width="400" height="250" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </div>
            </section>
            <section class="staff">
                <h2>Meet our staff</h2>
                <div class="gallery">
                    <img class="img1" src="images/happy_employee1.jpg" alt="happy_employee1" width="150">
                    <figcaption>John Marston</figcaption>
                    <img class="img2" src="images/happy_employee2.jpg" alt="happy_employee2" width="150">
                    <figcaption>Arthur Morgan</figcaption>
                    <img class="img3" src="images/happy_employee3.jpg" alt="happy_employee3" width="150">
                    <figcaption>Ana Williams</figcaption>
                </div>
            </section>
            <form>
                <fieldset>
                    <legend>Send a message</legend>
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" name="fullname">
                    <label for="useremail">Email</label>
                    <input type="text" id="useremail" name="useremail">
                </fieldset>
                <fieldset>
                    <legend>What is the purpose of the message?</legend>
                    <input type="radio" id="General Inquiry" name="purpose" value="General Inquiry">
                    <label for="General Inquiry">General Inquiry</label><br>
                    <input type="radio" id="Reservation Question" name="purpose" value="Reservation Question">
                    <label for="Reservation Question">Reservation Question</label><br>
                    <input type="radio" id="Website Suggestion" name="purpose" value="Website Suggestion">
                    <label for="Website Suggestion">Website Suggestion</label><br>
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rols="4"></textarea>
                    <label for="subscribe">Please subscribe me to the monthly newsletter</label>
                    <input type="checkbox" id="subscribe" name="subscribe">
                </fieldset>
                <button type="submit">Submit Message</button>
            </form>
        </main>

            <p>&copy;2024 Whitewater Rafting, Guilherme Oliveira</p>

</html>
